<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="IndAI — Intelligent Detection AI. Paste your code, detect security vulnerabilities instantly, get auto-fixed results. Powered by 15 OWASP security rules." />
    <meta name="theme-color" content="#060a14" />
    <meta name="keywords" content="code security, vulnerability scanner, OWASP, static analysis, code audit, IndAI" />
    <title>IndAI — Intelligent Detection AI | Code Security Auditor</title>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('indai_theme');
          var theme = stored;
          if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
